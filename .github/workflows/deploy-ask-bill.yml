name: Deploy ask-bill edge function

# Lovable deploys the frontend but does not reliably deploy new Supabase edge
# functions. This deploys the bricker-os terminal brain directly via the
# Supabase CLI whenever its code changes, so the résumé terminal stays live
# without any manual Lovable step.
#
# One-time setup: add a repo secret SUPABASE_ACCESS_TOKEN
# (Supabase dashboard → Account → Access Tokens). Until then this workflow
# fails on the deploy step by design.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/ask-bill/**"
      - "supabase/functions/_shared/**"
      - ".github/workflows/deploy-ask-bill.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ulgoahsxkrkzoquvntei
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy ask-bill
        run: supabase functions deploy ask-bill --project-ref "$PROJECT_REF"
